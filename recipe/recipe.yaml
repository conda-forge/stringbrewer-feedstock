schema_version: 1

context:
  name: stringbrewer
  version: 0.0.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/stringbrewer-${{ version }}.tar.gz
  sha256: c2d113822f9393500b273cc833a21ce739036c02c62f47042e0f17ef9b9ea649

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - rstr
    - sre_yield

tests:
  - python:
      imports:
        - stringbrewer
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: Generate random strings matching a pattern
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/simoncozens/stringbrewer

extra:
  recipe-maintainers:
    - jan-janssen
